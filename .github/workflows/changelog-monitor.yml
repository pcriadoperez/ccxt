name: Exchange Changelog Monitor

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, no issues created)'
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      issues: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: exchange-changelog-monitor/requirements.txt

      - name: Install dependencies
        run: pip install -r exchange-changelog-monitor/requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Run changelog monitor
        working-directory: exchange-changelog-monitor
        run: python monitor.py run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_REPO: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit updated state
        run: |
          git config user.name "changelog-bot"
          git config user.email "changelog-bot@users.noreply.github.com"
          git add exchange-changelog-monitor/state.json
          git diff --cached --quiet || git commit -m "[bot] Update changelog monitor state"
          git push
